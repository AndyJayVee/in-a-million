<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 220" role="img" aria-labelledby="title desc">
  <title id="title">In@Million logo</title>
  <desc id="desc">In@Million wordmark with colorful at symbol between In and Million</desc>
  <defs>
    <linearGradient id="gradA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b87ff"/>
      <stop offset="35%" stop-color="#5333ff"/>
      <stop offset="68%" stop-color="#ff1f9d"/>
      <stop offset="100%" stop-color="#ffd44d"/>
    </linearGradient>
    <linearGradient id="gradB" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#1fd6ff"/>
      <stop offset="45%" stop-color="#2456ff"/>
      <stop offset="100%" stop-color="#ff7f32"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#7eaef5" flood-opacity="0.16"/>
    </filter>
  </defs>

  <g fill="#121a2f" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="152" letter-spacing="-6">
    <text x="0" y="154">In</text>
    <text x="398" y="154">Million</text>
  </g>

  <g transform="translate(215 20)" filter="url(#softShadow)">
    <ellipse cx="72" cy="84" rx="76" ry="58" transform="rotate(-18 72 84)" fill="none" stroke="url(#gradA)" stroke-width="22"/>
    <ellipse cx="72" cy="84" rx="58" ry="44" transform="rotate(-18 72 84)" fill="none" stroke="url(#gradB)" stroke-width="18" opacity="0.92"/>
    <text x="18" y="128" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="138">@</text>
  </g>
</svg>
